<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EdenX - Login Futurista</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <canvas id="bgCanvas"></canvas>

    <div class="login-container">
        <header class="logo-container">
            <h1>Éden<span>X</span></h1>
            <div class="logo-glow"></div>
        </header>

        <form id="loginForm">
            <p class="welcome-text">Bem-vindo ao ÉdenX</p>
            
            <div class="input-group">
                <i data-lucide="user"></i>
                <input type="text" id="user" placeholder="Nome de Usuário / E-mail" required>
            </div>

            <div class="input-group">
                <i data-lucide="lock"></i>
                <input type="password" id="password" placeholder="Senha" required>
            </div>

            <button type="submit" class="btn-login">ENTRAR</button>

            <div class="form-footer">
                <a href="./loadingsenha.html" class="link">Esqueci a senha?</a>
                <p>Ainda não tem conta? <a href="./loadingcadastrar.html" class="link highlight">Criar conta</a></p>
            </div>
        </form>
    </div>

    <script src="./script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
