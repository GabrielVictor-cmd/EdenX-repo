<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EdenX - Recuperar Senha</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <canvas id="bgCanvas"></canvas>

    <div class="login-container">
        <header class="logo-container">
            <h1>Éden<span>X</span></h1>
        </header>

        <form id="forgotForm">
            <p class="welcome-text">Recuperação de conta</p>
            <p class="info-text">Insira seu e-mail para receber o link de redefinição.</p>

            <div class="input-group">
                <i data-lucide="mail"></i>
                <input type="email" id="email" placeholder="E-mail cadastrado" required>
            </div>

            <button type="submit" class="btn-login">ENVIAR LINK</button>

            <div class="form-footer">
                <a href="../login/loadingvoltar.html" class="link">Voltar para o login</a>
            </div>

            <a href="./loadingvoltar.html" class="btn-back" title="Voltar">
                <i data-lucide="chevron-left"></i>
            </a>
        </form>
    </div>

    <script src="./script.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
